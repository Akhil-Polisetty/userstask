<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>March 23th joining batch</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>
</head>

<body>

    <h1><b>Welcome to the users table of March 23th 2026</b></h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
            </tr>
        </thead>

        <tbody id="tableBody">
        </tbody>
    </table>

    <script>

        // Array of users
        const users = [
            { name: "Akhil" },
            { name: "Arjun" },
            { name: "Madhav" },
            { name: "Pavan" },
            { name: "Sai kesav"},
            { name: "Sumit sai" },
            { name: "sai kiran" },
            { name: "Aswin" },
            { name: "Manoj" },
            { name: "sashank" },
            { name: "Praveen" },
            { name: "Bharath" },
            { name: "Easwar" },
            { name: "Lokesh" },
            { name: "Ashish" },
            { name: "Lokesh" },

        ];

        const tableBody = document.getElementById("tableBody");

        // Loop through users array
        users.forEach((user, index) => {

            let row = `
                <tr>
                    <td>${index + 1}</td>
                    <td>${user.name}</td>
                </tr>
            `;

            tableBody.innerHTML += row;
        });

    </script>

</body>
</html>
